services:
    php:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: user_api_php
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
        depends_on:
            - mysql

    nginx:
        image: nginx:alpine
        container_name: user_api_nginx
        ports:
            # Мапим локальный порт 8000 на 80 порт внутри контейнера
            - "8000:80"
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php

    mysql:
        image: mysql:8.0
        container_name: user_api
        environment:
            MYSQL_DATABASE: user_api
            MYSQL_USER: admin
            MYSQL_PASSWORD: root
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "3306:3306"
        volumes:
            - user_api_data:/var/lib/mysql

volumes:
    user_api_data:
